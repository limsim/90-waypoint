<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90 Waypoint Walk</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 20px;
        }

        h1 {
            font-size: 1.4rem;
            color: #222;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #f8f8f8;
            border-radius: 6px;
            border: 1px solid #e8e8e8;
        }

        button {
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background: #222;
            color: #fff;
            transition: background 0.15s;
        }

        button:hover { background: #444; }

        #clearBtn {
            background: #fff;
            color: #333;
            border: 1px solid #ccc;
        }

        #clearBtn:hover { background: #f0f0f0; }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        canvas {
            display: block;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        #tooltip {
            display: none;
            position: absolute;
            background: rgba(0,0,0,0.82);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.7;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }

        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 12px;
            font-size: 12px;
            color: #666;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000;
            flex-shrink: 0;
        }

        .legend-dot.endpoint {
            background: #000;
            border-color: #fff;
            outline: 2px solid #000;
        }

        .legend-dot.middle { background: #fff; }

        .legend-ring {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 3px solid #f5a623;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>90 Waypoint Walk</h1>

        <div class="toolbar">
            <button id="generateBtn">Generate Walk</button>
            <button id="clearBtn">Clear</button>

            <div class="control-group">
                <label>
                    <input type="checkbox" id="showWildcards" checked>
                    Show Wildcards
                </label>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="waypointCanvas" width="794" height="1123"></canvas>
            <div id="tooltip"></div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot endpoint"></div>
                <span>Start / End (waypoints 1 &amp; 90)</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot middle"></div>
                <span>Waypoint</span>
            </div>
            <div class="legend-item">
                <div class="legend-ring"></div>
                <span>Wildcard — walker goes straight (10 total)</span>
            </div>
        </div>
    </div>

    <script type="module" src="dist/index.js"></script>
</body>
</html>
